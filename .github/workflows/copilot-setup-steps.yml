name: "Copilot Setup Steps - Token Management"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .copilot-token-config.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: npm ci

      - name: Install token tracking tools
        run: |
          pip install tokalator tokdu
          npm install -g tokalator

      - name: Verify setup
        run: |
          echo "✓ Token management setup complete"
          ./logs/token_dashboard.sh || echo "Dashboard ready"

      - name: Load token rules
        run: |
          source ./.copilot-token-rules.sh
          echo "✓ Rules loaded: Budget=$COPILOT_TOKEN_BUDGET, Model=$COPILOT_MODEL"
